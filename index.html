<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

#container{
position:relative;
width:1200px;
margin:auto;
}

#map{
width:100%;
}

.tree{
position:absolute;
background:yellow;
border:1px solid black;
padding:3px 6px;
font-size:12px;
cursor:pointer;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border:2px solid black;
display:none;
width:260px;
text-align:left;
}

</style>
</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY TRUNG ĐOÀN</h2>

<div id="container">

<img id="map" src="sodo.png">

</div>

<div id="popup"></div>

<script>

let trees={}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook = XLSX.read(data)

let sheet = workbook.Sheets[workbook.SheetNames[0]]

let rows = XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{
trees[r.STT]=r
})

})

const container=document.getElementById("container")

/* tạo 84 cây */

for(let i=1;i<=84;i++){

let d=document.createElement("div")

d.className="tree"

d.innerText=i

d.dataset.id=i

/* vị trí sơ đồ */

let x=0
let y=0

/* khán đài */

if(i<=10){

x=450+(i*40)
y=40

}

/* bên trái sân */

else if(i>=11 && i<=23){

x=350
y=120+(i-11)*35

}

/* hàng dưới sân */

else if(i>=24 && i<=30){

x=450+(i-24)*50
y=520

}

/* bên phải sân */

else if(i>=31 && i<=43){

x=850
y=480-(i-31)*35

}

/* khu nhà trực ban */

else if(i>=44 && i<=58){

x=1020
y=80+(i-44)*30

}

/* hàng ngang phải */

else if(i>=59 && i<=63){

x=980+(i-59)*40
y=560

}

/* khu sân bóng */

else if(i>=64 && i<=71){

x=900-(i-64)*40
y=620

}

/* khu sở chỉ huy */

else if(i>=72 && i<=77){

x=700-(i-72)*50
y=580

}

/* khu nhà sĩ quan */

else if(i>=78 && i<=82){

x=450-(i-78)*60
y=620

}

/* khu nhà ở chỉ huy */

else if(i==83){

x=210
y=540

}

else if(i==84){

x=210
y=500

}

d.style.left=x+"px"
d.style.top=y+"px"

d.onclick=function(){

let id=this.dataset.id

let data=trees[id]

if(!data){
alert("Chưa có dữ liệu")
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+
"<b>Loại cây:</b> "+data["Loại cây"]+"<br>"+
"<b>Khu vực:</b> "+data["Khu vực"]+"<br>"+
"<b>Ngày trồng:</b> "+data["Ngày trồng"]+"<br>"+
"<b>Chiều cao:</b> "+data["Chiều cao"]+"<br>"+
"<b>Tình trạng:</b> "+data["Tình trạng"]+"<br><br>"+
"<button onclick='dong()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

container.appendChild(d)

}

function dong(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
