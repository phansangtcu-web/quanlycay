<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1200px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.zone{
fill:transparent;
cursor:pointer;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:330px;
font-size:18px;
}

button{
font-size:16px;
padding:5px 15px;
}

</style>
</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">

<img src="sodo.png">

<svg viewBox="0 0 1200 900">

<!-- ví dụ 1 số vị trí, anh có thể thêm tiếp đến 84 -->

<rect class="zone" x="920" y="130" width="30" height="30" onclick="showTree(1)"/>
<rect class="zone" x="890" y="130" width="30" height="30" onclick="showTree(2)"/>
<rect class="zone" x="860" y="130" width="30" height="30" onclick="showTree(3)"/>
<rect class="zone" x="830" y="130" width="30" height="30" onclick="showTree(4)"/>
<rect class="zone" x="800" y="130" width="30" height="30" onclick="showTree(5)"/>

<rect class="zone" x="520" y="250" width="30" height="30" onclick="showTree(11)"/>
<rect class="zone" x="520" y="290" width="30" height="30" onclick="showTree(12)"/>
<rect class="zone" x="520" y="330" width="30" height="30" onclick="showTree(13)"/>

<rect class="zone" x="1030" y="210" width="30" height="30" onclick="showTree(44)"/>
<rect class="zone" x="1030" y="250" width="30" height="30" onclick="showTree(45)"/>

</svg>

</div>

<div id="popup"></div>

<script>

let trees = {}

function excelDateToJS(serial){

let utc_days = Math.floor(serial - 25569)
let utc_value = utc_days * 86400
let date = new Date(utc_value * 1000)

return date.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

let wb = XLSX.read(data,{type:"array"})
let sheet = wb.Sheets[wb.SheetNames[0]]
let rows = XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let ngay = r["Ngày trồng"]

if(typeof ngay === "number"){
ngay = excelDateToJS(ngay)
}

trees[r["STT"]] = {

macay: r["Mã cây"],
khuvuc: r["Khu  vực"],   // đúng tên cột Excel
loaicay: r["Loại cây"],
ngay: ngay,
chieucao: r["Chiều cao"],
tan: r["Độ rộng tán"],
tinhtrang: r["Tình trạng"]

}

})

})

function showTree(id){

let t = trees[id]

if(!t){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML =

"<b>Cây số:</b> "+id+"<br><br>"+

"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+

"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
