<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

img{
max-width:100%;
height:auto;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
text-align:left;
}

button{
margin-top:10px;
padding:6px 15px;
}

</style>

</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN</h2>

<img src="sodo.png" usemap="#caymap">

<map name="caymap">

<!-- Ví dụ vài điểm bấm (anh có thể thêm tiếp nếu cần) -->
<area shape="rect" coords="880,120,910,150" onclick="showTree(1)">
<area shape="rect" coords="850,120,880,150" onclick="showTree(2)">
<area shape="rect" coords="820,120,850,150" onclick="showTree(3)">
<area shape="rect" coords="790,120,820,150" onclick="showTree(4)">
<area shape="rect" coords="760,120,790,150" onclick="showTree(5)">

</map>

<div id="popup"></div>

<script>

let trees = {}

function excelDateToJSDate(serial){

let utc_days = Math.floor(serial - 25569)
let utc_value = utc_days * 86400
let date_info = new Date(utc_value * 1000)

return date_info.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

let workbook = XLSX.read(data)

let sheet = workbook.Sheets[workbook.SheetNames[0]]

let rows = XLSX.utils.sheet_to_json(sheet)

rows.forEach(r => {

let stt = r["STT"]

let ngay = r["Ngày trồng"]

if(typeof ngay === "number"){
ngay = excelDateToJSDate(ngay)
}

trees[stt] = {

loaicay: r["Loại cây"] || "Chưa nhập",
khuvuc: r["Khu vực"] || "Chưa nhập",
ngaytrong: ngay || "Chưa nhập",
chieucao: r["Chiều cao"] || "Chưa nhập",
tinhtrang: r["Tình trạng"] || "Chưa nhập"

}

})

})

function showTree(id){

let d = trees[id]

if(!d){
alert("Chưa có dữ liệu cây số " + id)
return
}

document.getElementById("popup").innerHTML =

"<b>Cây số:</b> " + id + "<br><br>" +

"<b>Loại cây:</b> " + d.loaicay + "<br>" +

"<b>Khu vực:</b> " + d.khuvuc + "<br>" +

"<b>Ngày trồng:</b> " + d.ngaytrong + "<br>" +

"<b>Chiều cao:</b> " + d.chieucao + "<br>" +

"<b>Tình trạng:</b> " + d.tinhtrang +

"<br><br><button onclick='dong()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function dong(){
document.getElementById("popup").style.display="none"
}

</script>

</body>

</html>
