<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1400px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

#zones{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:auto;
}

.zone{
fill:rgba(0,0,0,0);
cursor:pointer;
}

#popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:340px;
font-size:18px;

}

</style>

</head>


<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">

<img src="sodo.png">

<svg id="zones" viewBox="0 0 1600 900" preserveAspectRatio="none"></svg>

</div>

<div id="popup"></div>


<script>

/* ======================
ĐỌC EXCEL
====================== */

let trees={}

function excelDateToJS(serial){

let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date=new Date(utc_value*1000)

return date.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{defval:""})

rows.forEach(r=>{

let ngay=r["Ngày trồng"]

if(typeof ngay==="number"){
ngay=excelDateToJS(ngay)
}

trees[r["STT"]] = {

macay:r["Mã cây"],
khuvuc:r["Khu vực"],
loaicay:r["Loại cây"],
ngay:ngay,
chieucao:r["Chiều cao"],
tan:r["Độ rộng tán"],
tinhtrang:r["Tình trạng"]

}

})

})


/* ======================
TỌA ĐỘ CÂY (ĐÃ CHỈNH)
====================== */

let positions={

1:[1180,150],2:[1140,150],3:[1100,150],4:[1060,150],5:[1020,150],
6:[880,150],7:[840,150],8:[800,150],9:[760,150],10:[720,150],

11:[760,240],12:[760,280],13:[760,320],14:[760,360],15:[760,400],
16:[760,440],17:[760,480],18:[760,520],

20:[760,570],21:[760,610],22:[760,650],23:[760,690],

24:[840,730],25:[880,730],26:[920,730],27:[960,730],28:[1000,730],
29:[1040,730],30:[1080,730],

31:[1140,690],32:[1140,650],33:[1140,610],34:[1140,570],
35:[1140,530],36:[1140,490],37:[1140,450],38:[1140,410],
39:[1140,370],40:[1140,330],41:[1140,290],42:[1140,250],43:[1140,210],

/* 44 → 58 chỉnh lên trên */

44:[1320,150],
45:[1320,190],
46:[1320,230],
47:[1320,270],
48:[1320,310],
49:[1320,350],
50:[1320,390],
51:[1320,430],
52:[1320,470],
53:[1320,510],
54:[1320,550],
55:[1320,590],
56:[1320,630],
57:[1320,670],
58:[1320,710],

/* 59 → 63 chỉnh lên */

59:[1200,760],
60:[1140,760],
61:[1080,760],
62:[1020,760],
63:[960,760],

/* 64 → 68 chỉnh lên */

64:[1080,720],
65:[1020,720],
66:[960,720],
67:[900,720],
68:[840,720],

69:[1140,750],
70:[1140,790],
71:[1140,830],

72:[1040,750],
73:[980,750],
74:[920,750],
75:[860,750],
76:[800,750],
77:[740,750],

78:[680,790],
79:[600,750],
80:[520,790],
81:[440,790],
82:[360,790],

83:[320,680],
84:[320,620]

}


/* ======================
TẠO VÙNG CLICK
====================== */

let svg=document.getElementById("zones")

for(let i in positions){

let p=positions[i]

let rect=document.createElementNS("http://www.w3.org/2000/svg","rect")

rect.setAttribute("x",p[0])
rect.setAttribute("y",p[1])

rect.setAttribute("width",38)
rect.setAttribute("height",38)

rect.setAttribute("class","zone")

rect.addEventListener("click",()=>showTree(i))

svg.appendChild(rect)

}


/* ======================
POPUP
====================== */

function showTree(id){

let t=trees[id]

if(!t){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+

"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+

"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
