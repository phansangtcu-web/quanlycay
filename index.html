<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1400px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

#zones{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.zone{
position:absolute;
width:3.2%;
height:3.2%;
transform:translate(-50%,-50%);
cursor:pointer;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:320px;
font-size:16px;
z-index:999;
}

</style>
</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">
<img src="sodo.png">
<div id="zones"></div>
</div>

<div id="popup"></div>

<script>

/* ======================
ĐỌC EXCEL
====================== */

let trees={}

function excelDateToJS(serial){
let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date=new Date(utc_value*1000)
return date.toLocaleDateString("vi-VN")
}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{
let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{defval:""})

rows.forEach(r=>{
let ngay=r["Ngày trồng"]
if(typeof ngay==="number"){
ngay=excelDateToJS(ngay)
}

trees[r["STT"]] = {
macay:r["Mã cây"],
khuvuc:r["Khu vực"],
loaicay:r["Loại cây"],
ngay:ngay,
chieucao:r["Chiều cao"],
tan:r["Độ rộng tán"],
tinhtrang:r["Tình trạng"]
}
})
})

/* ======================
TỌA ĐỘ CHUẨN %
====================== */

let positions={

// HÀNG TRÊN (1–10)
1:[82,17],2:[79,17],3:[76,17],4:[73,17],5:[70,17],
6:[60,17],7:[57,17],8:[54,17],9:[51,17],10:[48,17],

// CỘT TRÁI (11–23)
11:[52,27],12:[52,30],13:[52,33],14:[52,36],15:[52,39],
16:[52,42],17:[52,45],18:[52,48],
20:[52,52],21:[52,55],22:[52,58],23:[52,61],

// HÀNG DƯỚI SÂN (24–30)
24:[57,65],25:[60,65],26:[63,65],27:[66,65],28:[69,65],29:[72,65],30:[75,65],

// CỘT PHẢI SÂN (31–43)
31:[80,61],32:[80,58],33:[80,55],34:[80,52],
35:[80,49],36:[80,46],37:[80,43],38:[80,40],
39:[80,37],40:[80,34],41:[80,31],42:[80,28],43:[80,25],

// CỘT PHẢI NGOÀI (44–58)
44:[93,18],45:[93,22],46:[93,26],47:[93,30],48:[93,34],
49:[93,38],50:[93,42],51:[93,46],52:[93,50],53:[93,54],
54:[93,58],55:[93,62],56:[93,66],57:[93,70],58:[93,74],

// HÀNG DƯỚI PHẢI (59–63)
59:[85,78],60:[82,78],61:[79,78],62:[76,78],63:[73,78],

// HÀNG TRONG (64–68)
64:[76,74],65:[73,74],66:[70,74],67:[67,74],68:[64,74],

// NHÓM 69–71
69:[80,77],70:[80,81],71:[80,85],

// HÀNG GIỮA (72–77)
72:[72,77],73:[69,77],74:[66,77],75:[63,77],76:[60,77],77:[57,77],

// TRÁI DƯỚI (78–82)
78:[52,81],79:[46,77],80:[40,81],81:[34,81],82:[28,81],

// TRÁI TRÊN (83–84)
83:[25,70],84:[25,65]

}

/* ======================
TẠO ZONE
====================== */

let container=document.getElementById("zones")

for(let i in positions){

let p=positions[i]

let div=document.createElement("div")
div.className="zone"

div.style.left=p[0]+"%"
div.style.top=p[1]+"%"

div.title="Cây "+i

div.addEventListener("click",()=>{
showTree(i)
div.style.background="rgba(0,255,0,0.4)"
setTimeout(()=>div.style.background="transparent",500)
})

container.appendChild(div)
}

/* ======================
POPUP
====================== */

function showTree(id){

let t=trees[id]

if(!t){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+
"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+
"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
