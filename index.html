<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Sơ đồ quản lý cây</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

#map{
position:relative;
display:inline-block;
}

#map img{
width:1200px;
}

.tree{
position:absolute;
background:yellow;
border:1px solid black;
font-size:12px;
padding:2px 5px;
cursor:pointer;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:300px;
text-align:left;
}

button{
padding:5px 10px;
}

</style>

</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY</h2>

<div id="map">

<img src="sodo.png">

</div>

<div id="popup"></div>

<script>

let trees={}

function excelDateToJSDate(serial){

let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date_info=new Date(utc_value*1000)

return date_info.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook=XLSX.read(data)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let stt=r["STT"]

let ngay=r["Ngày trồng"]

if(typeof ngay==="number"){
ngay=excelDateToJSDate(ngay)
}

trees[stt]={

loaicay:r["Loại cây"]||"",
khuvuc:r["Khu vực"]||"",
ngaytrong:ngay||"",
chieucao:r["Chiều cao"]||"",
tinhtrang:r["Tình trạng"]||""

}

})

taoCay()

})

function taoCay(){

const map=document.getElementById("map")

for(let i=1;i<=84;i++){

let d=document.createElement("div")

d.className="tree"

d.innerHTML=i

d.onclick=function(){showTree(i)}

let x=50+(i*10)
let y=50+(i*5)

d.style.left=x+"px"
d.style.top=y+"px"

map.appendChild(d)

}

}

function showTree(id){

let d=trees[id]

if(!d){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+
"<b>Loại cây:</b> "+d.loaicay+"<br>"+
"<b>Khu vực:</b> "+d.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+d.ngaytrong+"<br>"+
"<b>Chiều cao:</b> "+d.chieucao+"<br>"+
"<b>Tình trạng:</b> "+d.tinhtrang+
"<br><br><button onclick='dong()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function dong(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
