<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1400px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

#zones{
position:absolute;
top:0;
left:0;
}

.zone{
fill:transparent;
cursor:pointer;
}

#popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:340px;
font-size:18px;

}

</style>

</head>


<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">

<img id="mapImg" src="sodo.png">

<svg id="zones"></svg>

</div>

<div id="popup"></div>


<script>

/* ======================
ĐỌC EXCEL
====================== */

let trees={}

function excelDateToJS(serial){

let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date=new Date(utc_value*1000)

return date.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]

let rows=XLSX.utils.sheet_to_json(sheet,{defval:""})

rows.forEach(r=>{

let ngay=r["Ngày trồng"]

if(typeof ngay==="number"){
ngay=excelDateToJS(ngay)
}

trees[r["STT"]] = {

macay:r["Mã cây"],
khuvuc:r["Khu vực"],
loaicay:r["Loại cây"],
ngay:ngay,
chieucao:r["Chiều cao"],
tan:r["Độ rộng tán"],
tinhtrang:r["Tình trạng"]

}

})

})


/* ======================
TỌA ĐỘ GỐC ẢNH
====================== */

let positions={

1:[1180,160],2:[1140,160],3:[1100,160],4:[1060,160],5:[1020,160],
6:[880,160],7:[840,160],8:[800,160],9:[760,160],10:[720,160],

11:[760,260],12:[760,300],13:[760,340],14:[760,380],15:[760,420],
16:[760,460],17:[760,500],18:[760,540],

20:[760,590],21:[760,630],22:[760,670],23:[760,710],

24:[840,750],25:[880,750],26:[920,750],27:[960,750],28:[1000,750],
29:[1040,750],30:[1080,750],

31:[1140,710],32:[1140,670],33:[1140,630],34:[1140,590],
35:[1140,550],36:[1140,510],37:[1140,470],38:[1140,430],
39:[1140,390],40:[1140,350],41:[1140,310],42:[1140,270],43:[1140,230],

44:[1320,200],45:[1320,240],46:[1320,280],47:[1320,320],
48:[1320,360],49:[1320,400],50:[1320,440],51:[1320,480],
52:[1320,520],53:[1320,560],54:[1320,600],55:[1320,640],
56:[1320,680],57:[1320,720],58:[1320,760],

59:[1200,820],60:[1140,820],61:[1080,820],62:[1020,820],63:[960,820],

64:[1080,770],65:[1020,770],66:[960,770],67:[900,770],68:[840,770],

69:[1140,790],70:[1140,830],71:[1140,870],

72:[1040,790],73:[980,790],74:[920,790],75:[860,790],
76:[800,790],77:[740,790],

78:[680,830],79:[600,790],80:[520,830],81:[440,830],82:[360,830],

83:[320,720],84:[320,660]

}


/* ======================
KHỚP SVG THEO ẢNH
====================== */

let img=document.getElementById("mapImg")
let svg=document.getElementById("zones")

img.onload=function(){

let w=img.clientWidth
let h=img.clientHeight

svg.setAttribute("width",w)
svg.setAttribute("height",h)

drawZones(w,h)

}

window.addEventListener("resize",()=>{

svg.innerHTML=""
img.onload()

})


/* ======================
VẼ VÙNG CLICK
====================== */

function drawZones(w,h){

let scaleX=w/1600
let scaleY=h/922

for(let i in positions){

let p=positions[i]

let rect=document.createElementNS("http://www.w3.org/2000/svg","rect")

rect.setAttribute("x",p[0]*scaleX)
rect.setAttribute("y",p[1]*scaleY)

rect.setAttribute("width",40*scaleX)
rect.setAttribute("height",40*scaleY)

rect.setAttribute("class","zone")

rect.addEventListener("click",()=>showTree(i))

svg.appendChild(rect)

}

}


/* ======================
POPUP
====================== */

function showTree(id){

let t=trees[id]

if(!t){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+

"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+

"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
