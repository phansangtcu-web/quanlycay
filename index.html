<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1400px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.zone{
fill:transparent;
cursor:pointer;
}

#popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:white;
border:3px solid black;
padding:20px;
display:none;
width:340px;

font-size:18px;

}

button{

font-size:16px;
padding:6px 20px;

}

</style>

</head>


<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">

<img src="sodo.png">

<svg id="zones" viewBox="0 0 1200 900"></svg>

</div>

<div id="popup"></div>


<script>

let trees = {}

function excelDateToJS(serial){

let utc_days = Math.floor(serial - 25569)

let utc_value = utc_days * 86400

let date = new Date(utc_value * 1000)

return date.toLocaleDateString("vi-VN")

}


/* ĐỌC FILE EXCEL */

fetch("dulieucay.xlsx")
.then(res => res.arrayBuffer())
.then(data => {

let wb = XLSX.read(data,{type:"array"})

let sheet = wb.Sheets[wb.SheetNames[0]]

let rows = XLSX.utils.sheet_to_json(sheet,{defval:""})

rows.forEach(r=>{

let ngay = r["Ngày trồng"]

if(typeof ngay === "number"){
ngay = excelDateToJS(ngay)
}

trees[r["STT"]] = {

macay: r["Mã cây"],
khuvuc: r["Khu  vực"],
loaicay: r["Loại cây"],
ngay: ngay,
chieucao: r["Chiều cao"],
tan: r["Độ rộng tán"],
tinhtrang: r["Tình trạng"]

}

})

})

/* TẠO VÙNG CLICK */

let svg = document.getElementById("zones")

for(let i in positions){

let p = positions[i]

let rect = document.createElementNS("http://www.w3.org/2000/svg","rect")

rect.setAttribute("x",p[0])
rect.setAttribute("y",p[1])
rect.setAttribute("width",35)
rect.setAttribute("height",35)
rect.setAttribute("class","zone")

rect.addEventListener("click",()=>showTree(i))

svg.appendChild(rect)

}



/* HIỂN THỊ THÔNG TIN CÂY */

function showTree(id){

let t = trees[id]

if(!t){

alert("Chưa có dữ liệu cây "+id)
return

}

document.getElementById("popup").innerHTML =

"<b>Cây số:</b> "+id+"<br><br>"+

"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+

"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}



function closePopup(){

document.getElementById("popup").style.display="none"

}

</script>

</html>
