<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản lý cây Trung đoàn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
text-align:center;
}

#map{
position:relative;
max-width:1400px;
margin:auto;
}

#map img{
width:100%;
display:block;
}

#zones{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.zone{
fill:transparent;
cursor:pointer;
pointer-events:all;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:320px;
font-size:16px;
z-index:999;
}

</style>
</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY KHU VỰC TRUNG ĐOÀN BỘ</h2>

<div id="map">
<img id="mapimg" src="sodo.png">
<svg id="zones" viewBox="0 0 1600 900"></svg>
</div>

<div id="popup"></div>

<script>

/* ======================
ĐỌC EXCEL
====================== */

let trees={}

function excelDateToJS(serial){
let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date=new Date(utc_value*1000)
return date.toLocaleDateString("vi-VN")
}

fetch("dulieucay.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{
let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet,{defval:""})

rows.forEach(r=>{
let ngay=r["Ngày trồng"]
if(typeof ngay==="number"){
ngay=excelDateToJS(ngay)
}

trees[r["STT"]] = {
macay:r["Mã cây"],
khuvuc:r["Khu vực"],
loaicay:r["Loại cây"],
ngay:ngay,
chieucao:r["Chiều cao"],
tan:r["Độ rộng tán"],
tinhtrang:r["Tình trạng"]
}
})
})

/* ======================
TỌA ĐỘ (GIỮ NGUYÊN CỦA BẠN)
====================== */

let positions={

1:[1200,130],2:[1160,130],3:[1120,130],4:[1080,130],5:[1040,130],
6:[900,130],7:[860,130],8:[820,130],9:[780,130],10:[740,130],

11:[780,240],12:[780,280],13:[780,320],14:[780,360],15:[780,400],
16:[780,440],17:[780,480],18:[780,520],

20:[780,560],21:[780,600],22:[780,640],23:[780,680],

24:[860,720],25:[900,720],26:[940,720],27:[980,720],28:[1020,720],
29:[1060,720],30:[1100,720],

31:[1160,680],32:[1160,640],33:[1160,600],34:[1160,560],
35:[1160,520],36:[1160,480],37:[1160,440],38:[1160,400],
39:[1160,360],40:[1160,320],41:[1160,280],42:[1160,240],43:[1160,200],

44:[1340,150],45:[1340,190],46:[1340,230],47:[1340,270],48:[1340,310],
49:[1340,350],50:[1340,390],51:[1340,430],52:[1340,470],53:[1340,510],
54:[1340,550],55:[1340,590],56:[1340,630],57:[1340,670],58:[1340,710],

59:[1220,780],60:[1160,780],61:[1100,780],62:[1040,780],63:[980,780],

64:[1100,740],65:[1040,740],66:[980,740],67:[920,740],68:[860,740],

69:[1160,770],70:[1160,810],71:[1160,850],

72:[1040,770],73:[980,770],74:[920,770],75:[860,770],76:[800,770],77:[740,770],

78:[680,810],79:[600,770],80:[520,810],81:[440,810],82:[360,810],

83:[320,700],84:[320,640]

}

/* ======================
VẼ 1 LẦN DUY NHẤT (TỐI ƯU)
====================== */

let svg=document.getElementById("zones")

for(let id in positions){

let [x,y]=positions[id]

let rect=document.createElementNS("http://www.w3.org/2000/svg","rect")

rect.setAttribute("x",x-20)
rect.setAttribute("y",y-20)
rect.setAttribute("width",40)
rect.setAttribute("height",40)

rect.setAttribute("class","zone")

rect.addEventListener("click",()=>{
showTree(id)

// hiệu ứng click
rect.setAttribute("fill","rgba(0,255,0,0.3)")
setTimeout(()=>rect.setAttribute("fill","transparent"),400)
})

svg.appendChild(rect)

}

/* ======================
POPUP
====================== */

function showTree(id){

let t=trees[id]

if(!t){
alert("Chưa có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+
"<b>Mã cây:</b> "+t.macay+"<br>"+
"<b>Loại cây:</b> "+t.loaicay+"<br>"+
"<b>Khu vực:</b> "+t.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+t.ngay+"<br>"+
"<b>Chiều cao:</b> "+t.chieucao+"<br>"+
"<b>Độ rộng tán:</b> "+t.tan+"<br>"+
"<b>Tình trạng:</b> "+t.tinhtrang+
"<br><br><button onclick='closePopup()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
