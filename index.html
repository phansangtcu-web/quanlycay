<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sơ đồ cây</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
}

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border:3px solid black;
padding:20px;
display:none;
width:300px;
}
</style>

</head>

<body>

<h2>SƠ ĐỒ QUẢN LÝ CÂY</h2>

<img src="sodo.png" usemap="#mapcay" width="1200">

<map name="mapcay">

<area shape="rect" coords="1010,165,1040,195" onclick="showTree(1)">
<area shape="rect" coords="980,165,1010,195" onclick="showTree(2)">
<area shape="rect" coords="950,165,980,195" onclick="showTree(3)">
<area shape="rect" coords="920,165,950,195" onclick="showTree(4)">
<area shape="rect" coords="890,165,920,195" onclick="showTree(5)">

<area shape="rect" coords="630,165,660,195" onclick="showTree(6)">
<area shape="rect" coords="600,165,630,195" onclick="showTree(7)">
<area shape="rect" coords="570,165,600,195" onclick="showTree(8)">
<area shape="rect" coords="540,165,570,195" onclick="showTree(9)">
<area shape="rect" coords="510,165,540,195" onclick="showTree(10)">

<!-- tiếp tục thêm tới 84 -->

</map>

<div id="popup"></div>

<script>

let trees={}
let loaded=false

function excelDate(serial){

let utc_days=Math.floor(serial-25569)
let utc_value=utc_days*86400
let date=new Date(utc_value*1000)

return date.toLocaleDateString("vi-VN")

}

fetch("dulieucay.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{

let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]
let rows=XLSX.utils.sheet_to_json(sheet)

rows.forEach(r=>{

let stt=r["STT"]
let ngay=r["Ngày trồng"]

if(typeof ngay==="number"){
ngay=excelDate(ngay)
}

trees[stt]={

loaicay:r["Loại cây"],
khuvuc:r["Khu vực"],
ngay:ngay,
cao:r["Chiều cao"],
tinhtrang:r["Tình trạng"]

}

})

loaded=true

})

function showTree(id){

if(!loaded){
alert("Đang tải dữ liệu")
return
}

let d=trees[id]

if(!d){
alert("Không có dữ liệu cây "+id)
return
}

document.getElementById("popup").innerHTML=

"<b>Cây số:</b> "+id+"<br><br>"+
"<b>Loại cây:</b> "+d.loaicay+"<br>"+
"<b>Khu vực:</b> "+d.khuvuc+"<br>"+
"<b>Ngày trồng:</b> "+d.ngay+"<br>"+
"<b>Chiều cao:</b> "+d.cao+"<br>"+
"<b>Tình trạng:</b> "+d.tinhtrang+
"<br><br><button onclick='dong()'>Đóng</button>"

document.getElementById("popup").style.display="block"

}

function dong(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
